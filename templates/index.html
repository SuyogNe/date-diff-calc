<!DOCTYPE html>
<html>
<head>
    <title>Date Form</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f2f2f2;">

<div style="width:420px; margin:50px auto; background:white; padding:20px; border-radius:5px; box-shadow:0 0 5px rgba(0,0,0,0.2);">

    <p style="font-weight:bold; font-size:14px;">
        Enter the date, month and year separately as Date1, Month1, Year1 and Date2, Month2 and Year2
    </p>

    <form method="POST">

        <div style="display:flex; margin-bottom:10px;">
            <label style="width:120px;">Enter Date1</label>
            <input type="text" name="dt1" placeholder="Enter Date1" style="flex:1; padding:6px;">
        </div>

        <div style="display:flex; margin-bottom:10px;">
            <label style="width:120px;">Enter Month1</label>
            <input type="text" name="m1" placeholder="Enter Month1" style="flex:1; padding:6px;">
        </div>

        <div style="display:flex; margin-bottom:10px;">
            <label style="width:120px;">Enter Year1</label>
            <input type="text" name="year1" placeholder="Enter year1" style="flex:1; padding:6px;">
        </div>

        <div style="display:flex; margin-bottom:10px;">
            <label style="width:120px;">Enter Date2</label>
            <input type="text" name="dt2" placeholder="Enter Date2" style="flex:1; padding:6px;">
        </div>

        <div style="display:flex; margin-bottom:10px;">
            <label style="width:120px;">Enter Month2</label>
            <input type="text" name="m2" placeholder="Enter Month2" style="flex:1; padding:6px;">
        </div>

        <div style="display:flex; margin-bottom:15px;">
            <label style="width:120px;">Enter Year2</label>
            <input type="text" name="year2" placeholder="Enter year2" style="flex:1; padding:6px;">
        </div>

        <div style="text-align:center;">
            <button type="submit" style="background:#ff8c00; color:white; border:none; padding:8px 18px; cursor:pointer;">
                Submit
            </button>
        </div>

    </form>

    {% if difference is not none %}
    <h3 style="text-align:center; margin-top:15px;">
        Difference in days: {{ difference }}
    </h3>
    {% endif %}

</div>

</body>
</html>
